name: Deploy to GitHub Pages

# Allow the workflow to push built assets to the repository
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Use a user-created PAT if available, otherwise fall back to GITHUB_TOKEN
          github_token: ${{ secrets.PERSONAL_TOKEN || github.token }}
          publish_dir: ./dist
          publish_branch: gh-pages
